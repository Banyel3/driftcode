# ─── nginx config for DriftCode demo server ───────────────────────────────────
#
# Used ONLY for the DriftCode-managed rate-limited demo instance.
# Self-hosted users do NOT need nginx — their opencode server is exposed
# directly via docker-compose.
#
# Rate limits:
#   - 10 requests/minute per IP (burst: 5)
#   - SSE connections: 2 concurrent per IP
# ─────────────────────────────────────────────────────────────────────────────

# Zone for general API rate limiting: 10 req/min per IP
limit_req_zone $binary_remote_addr zone=driftcode_api:10m rate=10r/m;

# Zone for SSE connection limiting: max 2 concurrent SSE streams per IP
limit_conn_zone $binary_remote_addr zone=driftcode_sse:10m;

upstream opencode_backend {
    server opencode:4096;
    keepalive 32;
}

server {
    listen 80;
    server_name demo.driftcode.dev;

    # ── SSE event stream — long-lived connections ─────────────────────────
    location /event {
        limit_conn driftcode_sse 2;

        proxy_pass http://opencode_backend;
        proxy_http_version 1.1;

        # Required for SSE: disable buffering and chunked encoding
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # Keep SSE connections alive for up to 10 minutes
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── All other API endpoints ───────────────────────────────────────────
    location / {
        limit_req zone=driftcode_api burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://opencode_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;

        # Return friendly JSON on 429
        error_page 429 = @rate_limited;
    }

    location @rate_limited {
        default_type application/json;
        return 429 '{"code":"RATE_LIMITED","message":"Demo server rate limit exceeded. Self-host for unlimited usage: https://driftcode.dev/install"}';
    }
}
